            application/problem+json:
              schema:
                $ref: ../schemas/problem.json
  /v1/sync/pull:
    get:
      summary: Pull changes from server
      description: Retrieves changes (conversations, messages, notes, folders) that occurred after the specified `since` timestamp.
      parameters:
        - in: query
          name: since
          required: false
          schema: { type: string, format: date-time }
          description: ISO 8601 timestamp. If omitted, returns all data.
      responses:
        '200':
          description: Sync data
          content:
            application/json:
              schema: { $ref: '../schemas/sync-pull-response.json' }
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }
        '401':
          description: Not authenticated
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }
  /v1/sync/push:
    post:
      summary: Push changes to server
      description: Applies client-side changes (creates/updates/deletes) to the server. Uses Last-Write-Wins (LWW) based on `updatedAt`.
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '../schemas/sync-push-request.json' }
      responses:
        '200':
          description: Push successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }
        '401':
          description: Not authenticated
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }
        '502':
          description: Upstream error (Database failure)
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }
  /v1/notes/bulk:
    post:
      tags:
        - Notes
      summary: Bulk Create Notes
      description: Creates multiple new notes in a single request.
      operationId: bulkCreateNotes
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - notes
              properties:
                notes:
                  type: array
                  items:
                    type: object
                    required:
                      - id
                      - content
                    properties:
                      id:
                        type: string
                        format: uuid
                        description: Client-generated UUID for the note
                      title:
                        type: string
                        minLength: 1
                        description: Title of the note
                      content:
                        type: string
                        description: Note content in Markdown format
                      folderId:
                        type: string
                        format: uuid
                        nullable: true
                        description: ID of the parent folder (null for root)
      responses:
        '201':
          description: Notes bulk created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  notes:
                    type: array
                    items:
                      $ref: '#/components/schemas/Note'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/notes:
    post:
      summary: Create a note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { type: string, format: uuid }
                title: { type: string }
                content: { type: string }
                folderId: { type: string, format: uuid }
              required: [title, content]
      responses:
        '201':
          description: Note created
          content:
            application/json:
              schema:
                $ref: ../schemas/note.json
              examples:
                default:
                  $ref: '#/components/examples/noteCreate201'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: ../schemas/problem.json
        '401':
          description: Not authenticated
          content:
            application/problem+json:
              schema:
                $ref: ../schemas/problem.json
    get:
      summary: List notes
      parameters:
        - in: query
          name: folderId
          schema: { type: string, format: uuid }
          description: Filter by folder ID
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - in: query
          name: cursor
          schema: { type: string, description: Pagination cursor }
      responses:
        '200':
          description: List of notes
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: ../schemas/note.json
                  nextCursor:
                    oneOf:
                      - { type: string }
                      - { type: 'null' }
              examples:
                default:
                  $ref: '#/components/examples/noteList200'
        '401':
          description: Not authenticated
          content:
            application/problem+json:
              schema:
                $ref: ../schemas/problem.json
    delete:
      summary: Delete all notes
      description: Deletes all notes for the authenticated user.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  deletedCount:
                    type: integer
  /v1/notes/trash:
    get:
      summary: List deleted notes and folders (Trash)
