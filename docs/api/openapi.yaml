  /v1/agent/chat/stream:
    post:
      summary: Stream agent chat
      description: Interactive chat with the AI agent, supporting multiple modes (chat, summary, note). Returns a Server-Sent Events (SSE) stream.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userMessage]
              properties:
                userMessage: { type: string }
                contextText: { type: string }
                modeHint: { type: string, enum: [chat, summary, note, auto] }
      responses:
        '200':
          description: SSE stream established
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: status
                  data: {"phase":"analyzing","message":"..."}
                  
                  event: chunk
                  data: {"text":"Hello"}
        '401':
          description: Not authenticated
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }
  /v1/graph-ai/generate:
    post:
      summary: Generate graph from text (Async)
      description: Starts an asynchronous background task to generate a graph from the user's conversation history. Returns a task ID.
      requestBody:
        description: Options for graph generation.
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                includeSummary:
                  type: boolean
                  description: Whether to also generate a graph summary (3-mode pipeline).
      responses:
        '202':
          description: Task accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  taskId: { type: string }
                  status: { type: string }
        '401':
          description: Not authenticated
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }
        '409':
          description: Conflict (Task already processing)
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }
  /v1/graph-ai/summary:
    post:
      summary: Request graph summary generation
      description: Starts an asynchronous background task to generate a summary of the user's graph.
      responses:
        '202':
          description: Task accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  taskId: { type: string }
                  status: { type: string }
        '401':
          description: Not authenticated
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }
        '409':
          description: Conflict (Task already processing)
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }
    get:
      summary: Get graph summary
      description: >-
        Retrieves the generated summary and insights for the user's graph.
        If no summary has been generated yet, returns a default object with empty arrays (not a 404).
      responses:
        '200':
          description: Graph summary (may contain empty arrays if not yet generated)
          content:
            application/json:
              schema:
                $ref: ../schemas/graph-summary.json
        '401':
          description: Not authenticated
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }
        '502':
          description: Bad Gateway — database error
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }
    delete:
      summary: Delete graph summary
      description: Deletes the graph summary for the user.
      parameters:
        - in: query
          name: permanent
          schema: { type: boolean, default: false }
          description: If true, performs a hard delete. Otherwise, soft delete.
      responses:
        '204':
          description: No Content — successfully deleted
        '401':
          description: Not authenticated
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }
        '502':
          description: Bad Gateway — database error (retryable)
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }
  /v1/graph-ai/summary/restore:
    post:
      summary: Restore graph summary
      description: Restores a soft-deleted graph summary for the user.
      responses:
        '200':
          description: OK — summary restored successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: 'Summary restored' }
        '401':
          description: Not authenticated
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }
        '502':
          description: Bad Gateway — database error
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }
  /v1/graph-ai:
    delete:
      summary: Delete all graph data
      description: Deletes all knowledge graph data (nodes, edges, clusters, subclusters, stats) for the user.
      parameters:
        - in: query
          name: permanent
          schema: { type: boolean, default: false }
          description: If true, performs a hard delete. Otherwise, soft delete.
      responses:
        '204':
          description: No Content — successfully deleted
        '401':
          description: Not authenticated
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }
        '502':
          description: Bad Gateway — database error (retryable)
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }
  /v1/graph-ai/restore:
    post:
      summary: Restore all graph data
      description: Restores all soft-deleted knowledge graph data for the user.
      responses:
        '200':
          description: OK — graph data restored successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: 'Graph restored' }
        '401':
          description: Not authenticated
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }
        '502':
          description: Bad Gateway — database error
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }
  /v1/graph-ai/add-node:
    post:
      summary: Add updated conversation nodes to graph (Batch)
      description: Queues a process to batch add conversations modified since the graph's last updated time.
      responses:
        '202':
          description: Add node batch queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  taskId: { type: string }
                  status: { type: string }
        '401':
          description: Not authenticated
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }


