      summary: Delete a graph editor cluster
      operationId: deleteGraphEditorCluster
      tags: [Graph Editor]
      description: >
        Deletes a cluster. By default, deletion is rejected when the cluster has
        active nodes. Set `cascade=true` to delete contained nodes and related
        edges first. Set `permanent=true` for hard delete.
      parameters:
        - name: clusterId
          in: path
