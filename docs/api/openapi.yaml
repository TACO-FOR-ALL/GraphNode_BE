      summary: Generate graph from text (Async)
      description: Starts an asynchronous background task to generate a graph from the user's conversation history. Returns a task ID.
      requestBody:
        description: Options for graph generation.
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                includeSummary:
                  type: boolean
                  description: Whether to also generate a graph summary (3-mode pipeline).
      responses:
        '202':
          description: Task accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  taskId: { type: string }
                  status: { type: string }
        '200':
          description: No data to process, skipped
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  status: { type: string }
        '401':
          description: Not authenticated
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }
        '409':
          description: Conflict (Task already processing)
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }
