          schema:
            type: boolean
            default: false
      responses:
        '204':
          description: Subcluster deleted.
        '400':
          description: Invalid subcluster ID.
          content:
            application/problem+json:
              schema:
                $ref: ../schemas/problem.json
        '401':
          description: Not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: ../schemas/problem.json
        '404':
          description: Subcluster not found.
          content:
            application/problem+json:
