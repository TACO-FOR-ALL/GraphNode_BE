  /v1/graph/editor/transactions:
    post:
      summary: Execute graph editor operations in sequence
      operationId: executeGraphEditorBatch
      tags: [Graph Editor]
      description: >
        Executes up to 100 graph editor operations sequentially. This endpoint is
        not ACID: it does not wrap the full batch in one transaction and it does
        not roll back operations that already completed. On the first operation
        failure, execution stops and the API returns a Problem response; earlier
        successful operations may already be persisted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/graph-editor-requests.json#/$defs/BatchEditorRequestDto
      responses:
        '200':
          description: All operations completed successfully.
          content:
            application/json:
              schema:
                $ref: ../schemas/graph-editor-responses.json#/$defs/BatchEditorResponseDto
        '400':
          description: Invalid request body, empty operations array, or more than 100 operations.
          content:
            application/problem+json:
              schema:
                $ref: ../schemas/problem.json
        '401':
          description: Not authenticated.
          content:
            application/problem+json:
              schema:
                $ref: ../schemas/problem.json
        '502':
          description: >
            A graph backend error or operation-level failure occurred. Because
            execution is best-effort and sequential, earlier operations may have
            been persisted before this response.
          content:
            application/problem+json:
              schema:
                $ref: ../schemas/problem.json
  /v1/sync/pull:
    get:
      summary: Pull changes from server
      description: Retrieves changes (conversations, messages, notes, folders) that occurred after the specified `since` timestamp.
      parameters:
        - in: query
          name: since
          required: false
          schema: { type: string, format: date-time }
          description: ISO 8601 timestamp. If omitted, returns all data.
      responses:
        '200':
          description: Sync data
          content:
            application/json:
              schema: { $ref: '../schemas/sync-pull-response.json' }
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }
        '401':
          description: Not authenticated
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }
  /v1/sync/push:
    post:
      summary: Push changes to server
      description: Applies client-side changes (creates/updates/deletes) to the server. Uses Last-Write-Wins (LWW) based on `updatedAt`.
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '../schemas/sync-push-request.json' }
      responses:
        '200':
          description: Push successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }
        '401':
          description: Not authenticated
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }
        '502':
          description: Upstream error (Database failure)
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }
