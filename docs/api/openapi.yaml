openapi: 3.1.0
info:
  title: GraphNode API
  version: 0.1.0
  description: >-
    Backend API for GraphNode. Errors follow RFC 9457 Problem Details.
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
paths:
  /v1/search:
    get:
      summary: Integrated keyword search across notes and AI chats
      tags: [Search]
      parameters:
        - name: q
          in: query
          required: true
          description: 검색할 키워드
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../schemas/search.json'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '../schemas/problem.json'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '../schemas/problem.json'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '../schemas/problem.json'
  /healthz:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]
              example:
                $ref: './examples/health-ok.json'
        '404':
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: ../schemas/problem.json
              example:
                $ref: './examples/problem-404.json'
  /v1/healthz:
    get:
      summary: Health check (versioned)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]
              example:
                $ref: './examples/health-ok.json'
        '404':
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: '../schemas/problem.json'
              example:
                $ref: './examples/problem-404.json'
  /v1/microscope:
    get:
      summary: List all user workspaces
      tags: [Microscope]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../schemas/microscope.json'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '../schemas/problem.json'
        '502':
          description: Bad Gateway — database error
          content:
            application/problem+json:
              schema:
                $ref: '../schemas/problem.json'

  /v1/microscope/nodes/ingest:
    post:
      summary: Create new workspace by ingesting a node (note or conversation)
      description: >-
        Starts an asynchronous Ingest pipeline that extracts entities and relations from the
        given note or conversation and builds a Microscope knowledge graph workspace.
        The response returns immediately with workspace metadata; use `GET /v1/microscope/:id`
        to poll for `COMPLETED` status.
      tags: [Microscope]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nodeId, nodeType]
              properties:
                nodeId:
                  type: string
                  description: ID of the note or conversation to ingest
                nodeType:
                  type: string
                  enum: [note, conversation]
                  description: Type of the source node
                schemaName:
                  type: string
                  description: Optional custom entity extraction schema name
      responses:
        '201':
          description: Created — workspace created and ingest pipeline started
          content:
            application/json:
              schema:
                $ref: '../schemas/microscope.json'
        '400':
          description: Bad Request — nodeId or nodeType missing
          content:
            application/problem+json:
              schema:
                $ref: '../schemas/problem.json'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '../schemas/problem.json'
        '502':
          description: Bad Gateway — SQS dispatch or database error
          content:
            application/problem+json:
              schema:
                $ref: '../schemas/problem.json'
  /v1/microscope/{groupId}:
    get:
      summary: Get detailed workspace status and metadata
      tags: [Microscope]
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '../schemas/microscope.json'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '../schemas/problem.json'
        '404':
          description: Not Found — workspace does not exist
          content:
            application/problem+json:
              schema:
                $ref: '../schemas/problem.json'
        '502':
          description: Bad Gateway — database error
          content:
            application/problem+json:
              schema:
                $ref: '../schemas/problem.json'
    delete:
      summary: Delete workspace and associated graph data
      tags: [Microscope]
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No Content — workspace deleted
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '../schemas/problem.json'
        '404':
          description: Not Found — workspace does not exist
          content:
            application/problem+json:
              schema:
                $ref: '../schemas/problem.json'
        '502':
          description: Bad Gateway — database error
          content:
            application/problem+json:
              schema:
                $ref: '../schemas/problem.json'
  /v1/microscope/{groupId}/documents:
    post:
      summary: Add more documents to existing workspace
      tags: [Microscope]
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                schemaName:
                  type: string
                files:
                  type: array
                  items:
                    type: string
                    format: binary
              required: [files]
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '../schemas/problem.json'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '../schemas/problem.json'
        '404':
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: '../schemas/problem.json'
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '../schemas/problem.json'
  /auth/google/start:
    get:
      summary: Start Google OAuth (redirects)
      description: Initiates Google OAuth2 authorization with state and PKCE. Redirects to Google's consent screen.
      responses:
        '302':
          description: Redirects to Google authorization URL
  /auth/google/callback:
    get:
      summary: Google OAuth callback
      description: Handles Google OAuth2 authorization code exchange. On success, sets a session cookie and returns ok.
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
        - in: query
          name: state
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Login succeeded, session cookie set
          headers:
            Set-Cookie:
              description: Session cookie set by server
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]
              example:
                $ref: './examples/oauth-login-ok.json'
        '400':
          description: Bad Request (missing/invalid parameters or state mismatch)
          content:
            application/problem+json:
              schema:
                $ref: ../schemas/problem.json
              example:
                $ref: './examples/problem-400.json'
        '502':
          description: Upstream error (provider failure)
          content:
            application/problem+json:
              schema:
                $ref: ../schemas/problem.json
              example:
                $ref: './examples/problem-502.json'
  /v1/notifications/stream:
    get:
      summary: Connect to notification stream (SSE)
      description: >-
        Establishes a Server-Sent Events (SSE) connection to receive real-time notifications.
        Optional `since` parameter allows replaying missed notifications from a specific cursor (ULID).
      parameters:
        - in: query
          name: since
          schema:
            type: string
          description: The last seen notification ID to replay from.
      responses:
        '200':
          description: Stream established
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  data: {"id":"01JK...","type":"CONNECTED","timestamp":"2026-03-19T...","message":"SSE Connection established"}

                  data: {"id":"01JK...","type":"JOB_COMPLETED","timestamp":"2026-03-19T...","payload":{...}}
  /v1/notifications/device-token:
    post:
      summary: Register FCM device token
      description: Registers a Firebase Cloud Messaging (FCM) token for the authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: The FCM device token to register.
      responses:
        '200':
          description: Token registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
        '400':
          description: Bad Request (missing token)
        '401':
          description: Not authenticated
    delete:
      summary: Unregister FCM device token
      description: Removes a Firebase Cloud Messaging (FCM) token for the authenticated user (e.g., on logout).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: The FCM device token to unregister.
      responses:
        '200':
          description: Token unregistered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
        '400':
          description: Bad Request (missing token)
        '401':
          description: Not authenticated
  /v1/me:
    get:
      summary: Check login status
      description: Returns current user if session cookie (server session) exists.
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: ../schemas/me-response.json
              example:
                $ref: './examples/me-get-200.json'
        '401':
          description: Not authenticated
          content:
            application/problem+json:
              schema:
                $ref: ../schemas/problem.json
              example:
                $ref: './examples/me-get-401.json'
  /v1/me/sessions:
    get:
      summary: List active sessions
      description: Returns a list of all active sessions for the authenticated user.
      responses:
        '200':
          description: List of sessions
          content:
            application/json:
              schema:
                $ref: ../schemas/sessions-response.json
        '401':
          description: Not authenticated
  /v1/me/sessions/{sessionId}:
    delete:
      summary: Revoke session
      description: Terminates a specific session (device) identified by sessionId.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-f0-9]{16}$'
      responses:
        '204':
          description: Session revoked
        '400':
          description: Invalid sessionId format
        '401':
          description: Not authenticated
  /v1/me/api-keys/{model}:
    get:
      summary: Get masked API key
      parameters:
        - name: model
          in: path
          required: true
          schema:
            type: string
            enum: [openai, deepseek, claude, gemini]
      responses:
        '200':
          description: Masked API key
          content:
            application/json:
              schema:
                $ref: ../schemas/api-key-response.json
        '401':
          description: Not authenticated
    patch:
      summary: Update API key
      parameters:
        - name: model
          in: path
          required: true
          schema:
            type: string
            enum: [openai, deepseek, claude, gemini]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/update-api-key-request.json
      responses:
        '204':
          description: Updated
        '400':
          description: Invalid request
        '401':
          description: Not authenticated
    delete:
      summary: Delete API key
      parameters:
        - name: model
          in: path
          required: true
          schema:
            type: string
            enum: [openai, deepseek, claude, gemini]
      responses:
        '204':
          description: Deleted
        '401':
          description: Not authenticated
  /v1/me/openai-assistant-id:
    get:
      summary: Get OpenAI Assistant ID
      responses:
        '200':
          description: Assistant ID
          content:
            application/json:
              schema:
                $ref: ../schemas/openai-assistant-id-response.json
        '401':
          description: Not authenticated
    patch:
      summary: Update OpenAI Assistant ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/update-openai-assistant-id-request.json
      responses:
        '204':
          description: Updated
        '400':
          description: Invalid request
        '401':
          description: Not authenticated
  /v1/me/preferred-language:
    get:
      summary: Get preferred language
      responses:
        '200':
          description: Preferred language
          content:
            application/json:
              schema:
                $ref: ../schemas/preferred-language-response.json
        '401':
          description: Not authenticated
    patch:
      summary: Update preferred language
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/update-preferred-language-request.json
      responses:
        '204':
          description: Updated
        '400':
          description: Invalid request
        '401':
          description: Not authenticated
  /v1/ai/conversations/bulk:
    post:
      summary: Bulk create conversations
      description: Creates multiple conversations and their associated messages in a single request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                conversations:
                  type: array
                  items:
                    $ref: ../schemas/conversation.json
            examples:
              default:
                $ref: ./examples/ai-conversations-bulk-post-request.json
      responses:
        '201':
          description: Bulk creation successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversations:
                    type: array
                    items:
                      $ref: ../schemas/conversation.json
              examples:
                default:
                  $ref: ./examples/ai-conversations-bulk-post-201.json
        '400':
          description: Bad Request (e.g., validation error)
          content:
            application/problem+json:
              schema:
                $ref: ../schemas/problem.json
              example:
                $ref: './examples/problem-400.json'
        '401':
          description: Not authenticated
          content:
            application/problem+json:
              schema:
                $ref: ../schemas/problem.json
              example:
                $ref: './examples/me-get-401.json'
  /v1/ai/conversations:
    post:
      summary: Create conversation
      description: Creates a new conversation using client-provided UUID/ULID as id. Optionally accepts initial messages.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, title]
              properties:
                id: { type: string }
                title: { type: string }
                messages:
                  type: array
                  items: { $ref: ../schemas/message.json }
            examples:
              default:
                externalValue: ./examples/ai-conversation-create-request.json
      responses:
        '201':
          description: Created
          headers:
            Location:
              description: Resource URL of the created conversation
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: ../schemas/conversation.json }
              examples:
                default:
                  externalValue: ./examples/ai-conversation-create-201.json
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema: { $ref: ../schemas/problem.json }
    get:
      summary: List conversations
      description: Returns a list of conversations. For performance reasons, the messages array in each conversation is empty. Use /test endpoint to get full message data.
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - in: query
          name: cursor
          schema: { type: string, description: ISO 8601 cursor }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: ../schemas/conversation.json }
                  nextCursor:
                    oneOf:
                      - { type: string }
                      - { type: 'null' }
              examples:
                default:
                  externalValue: ./examples/ai-conversation-list-200.json

    delete:
      summary: Delete all conversations
      description: Deletes all conversations and messages for the authenticated user.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  deletedCount:
                    type: integer
  /v1/ai/conversations/test:
    get:
      summary: '[TEST] List conversations with full messages'
      description: Returns a list of conversations including the full messages array. Used for testing and debugging.
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - in: query
          name: cursor
          schema: { type: string, description: ISO 8601 cursor }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: ../schemas/conversation.json }
                  nextCursor:
                    oneOf:
                      - { type: string }
                      - { type: 'null' }
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema: { $ref: '../schemas/problem.json' }

  /v1/ai/conversations/trash:
    get:
      summary: List deleted conversations (Trash)
      tags: [AI]
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - in: query
          name: cursor
          schema: { type: string, description: ISO 8601 cursor }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '../schemas/conversation.json' }
                  nextCursor:
                    oneOf:
                      - { type: string }
                      - { type: 'null' }
        '401':
          description: Unauthorized
  /v1/ai/conversations/{conversationId}:
    get:
      summary: Get conversation
      parameters:
        - in: path
          name: conversationId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: ../schemas/conversation.json }
              examples:
                default:
                  externalValue: ./examples/ai-conversation-get-200.json
        '404':
          description: Not Found
          content:
            application/problem+json:
              schema: { $ref: ../schemas/problem.json }
    patch:
      summary: Update conversation
      parameters:
        - in: path
          name: conversationId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
            examples:
              default:
                externalValue: ./examples/ai-conversation-update-request.json
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: ../schemas/conversation.json }
              examples:
                default:
                  externalValue: ./examples/ai-conversation-update-200.json
        '400':
          description: Bad Request — validation error (e.g. empty title)
          content:
            application/problem+json:
              schema: { $ref: ../schemas/problem.json }
        '401':
          description: Not authenticated
          content:
            application/problem+json:
              schema: { $ref: ../schemas/problem.json }
        '404':
          description: Not Found — conversation does not exist
          content:
            application/problem+json:
              schema: { $ref: ../schemas/problem.json }
        '502':
          description: Bad Gateway — database error
          content:
            application/problem+json:
              schema: { $ref: ../schemas/problem.json }
    delete:
      summary: Delete conversation
      parameters:
        - in: path
          name: conversationId
          required: true
          schema: { type: string }
        - in: query
          name: permanent
          schema: { type: boolean, default: false }
          description: If true, performs a hard delete (irreversible). Otherwise, soft delete (recoverable via restore).
      responses:
        '204':
          description: No Content — conversation deleted
        '401':
          description: Not authenticated
          content:
            application/problem+json:
              schema: { $ref: ../schemas/problem.json }
        '404':
          description: Not Found — conversation does not exist
          content:
            application/problem+json:
              schema: { $ref: ../schemas/problem.json }
        '502':
          description: Bad Gateway — database error
          content:
            application/problem+json:
              schema: { $ref: ../schemas/problem.json }
  /v1/ai/conversations/{conversationId}/restore:
    post:
      summary: Restore a deleted conversation
      description: Restores a soft-deleted conversation. Also cascades to restore associated graph nodes and edges.
      parameters:
        - in: path
          name: conversationId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK — conversation restored successfully
          content:
            application/json:
              schema:
                $ref: ../schemas/conversation.json
        '401':
          description: Not authenticated
          content:
            application/problem+json:
              schema:
                $ref: ../schemas/problem.json
        '404':
          description: Not Found — conversation does not exist or was not soft-deleted
          content:
            application/problem+json:
              schema:
                $ref: ../schemas/problem.json
        '502':
          description: Bad Gateway — database error during restore
          content:
            application/problem+json:
              schema:
                $ref: ../schemas/problem.json
  /v1/ai/conversations/{conversationId}/messages:
    post:
      summary: Create message
      parameters:
        - in: path
          name: conversationId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/message.json
            examples:
              default:
                externalValue: ./examples/ai-message-create-request.json
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: ../schemas/message.json }
              examples:
                default:
                  externalValue: ./examples/ai-message-create-201.json
        '400':
          description: Bad Request — empty content or validation error
          content:
            application/problem+json:
              schema: { $ref: ../schemas/problem.json }
        '401':
          description: Not authenticated
          content:
            application/problem+json:
              schema: { $ref: ../schemas/problem.json }
        '404':
          description: Not Found — conversation does not exist
          content:
            application/problem+json:
              schema: { $ref: ../schemas/problem.json }
        '502':
          description: Bad Gateway — database error
          content:
            application/problem+json:
              schema: { $ref: ../schemas/problem.json }
  /v1/ai/conversations/{conversationId}/messages/{messageId}:
    patch:
      summary: Update message
      parameters:
        - in: path
          name: conversationId
          required: true
          schema: { type: string }
        - in: path
          name: messageId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role: { type: string, enum: [user, assistant, system] }
                content: { type: string }
            examples:
              default:
                externalValue: ./examples/ai-message-update-request.json
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: ../schemas/message.json }
              examples:
                default:
                  externalValue: ./examples/ai-message-update-200.json
        '400':
          description: Bad Request — validation error
          content:
            application/problem+json:
              schema: { $ref: ../schemas/problem.json }
        '401':
          description: Not authenticated
          content:
            application/problem+json:
              schema: { $ref: ../schemas/problem.json }
        '404':
          description: Not Found — message or conversation does not exist
          content:
            application/problem+json:
